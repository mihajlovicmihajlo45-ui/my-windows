<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Моя Прокачана Вінда</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* Робочий стіл з новими шпалерами */
        #desktop {
            width: 100%;
            height: calc(100vh - 40px);
            background: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74') no-repeat center center/cover;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-start;
        }

        /* Стиль іконок */
        .icon {
            width: 80px;
            text-align: center;
            color: white;
            cursor: pointer;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            transition: transform 0.2s;
        }
        .icon:hover {
            transform: scale(1.1);
        }
        .icon img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }
        .icon span {
            display: block;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Загальний стиль для всіх вікон */
        .window {
            width: 500px;
            height: 350px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
            position: absolute;
            top: 15%;
            left: 25%;
            display: flex;
            flex-direction: column;
            box-shadow: 0px 8px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
            z-index: 10;
        }

        .window-header {
            background: #f3f3f3;
            border-bottom: 1px solid #e0e0e0;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .window-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .close-btn {
            background: #ff5f56;
            color: white;
            border: none;
            padding: 4px 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .close-btn:hover {
            background: #ff3b30;
        }

        .window-content {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        /* Стиль блокнота */
        .window-content textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            box-sizing: border-box;
            padding: 12px;
            font-size: 16px;
            background: transparent;
            outline: none;
        }

        /* Стиль браузера всередині вікна */
        .window-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Нижня панель завдань */
        #taskbar {
            width: 100%;
            height: 40px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 100;
        }

        #start-button {
            background: #0078d7;
            color: white;
            border: none;
            padding: 6px 18px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.2s;
        }
        #start-button:hover {
            background: #005a9e;
        }

        /* Реальний годинник на панелі задач */
        #clock {
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        /* Меню Пуск */
        #start-menu {
            width: 250px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            bottom: 45px;
            left: 10px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            color: white;
            padding: 15px;
            box-sizing: border-box;
            z-index: 99;
        }
        .start-header {
            font-weight: bold;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
            margin-bottom: 10px;
            color: #0078d7;
        }
        .start-item {
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
        }
        .start-item:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="desktop">
        
        <div class="icon" onclick="openWin('notepad-window')">
            <img src="https://cdn-icons-png.flaticon.com/512/564/564429.png" alt="Блокнот">
            <span>Блокнот</span>
        </div>

        <div class="icon" onclick="openWin('browser-window')">
            <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png" alt="Інтернет">
            <span>Інтернет</span>
        </div>

        <div id="notepad-window" class="window" style="display: none;">
            <div class="window-header">
                <span class="window-title">Мій Блокнот</span>
                <button class="close-btn" onclick="closeWin('notepad-window')">X</button>
            </div>
            <div class="window-content">
                <textarea placeholder="Напиши тут секретне повідомлення для друзів..."></textarea>
            </div>
        </div>

        <div id="browser-window" class="window" style="display: none; top: 20%; left: 30%;">
            <div class="window-header">
                <span class="window-title">Браузер (Пошук Google)</span>
                <button class="close-btn" onclick="closeWin('browser-window')">X</button>
            </div>
            <div class="window-content">
                <iframe src="https://www.google.com/webhp?igu=1"></iframe>
            </div>
        </div>

    </div>

    <div id="start-menu" style="display: none;">
        <div class="start-header">Вітаємо у системі!</div>
        <div class="start-item" onclick="openWin('notepad-window'); toggleStart();">📄 Відкрити Блокнот</div>
        <div class="start-item" onclick="openWin('browser-window'); toggleStart();">🌐 Запустити Інтернет</div>
        <div class="start-item" onclick="alert('Дякуємо, що користуєтесь моєю ОС!')">ℹ️ Про систему</div>
    </div>

    <div id="taskbar">
        <button id="start-button" onclick="toggleStart()">Пуск</button>
        <div id="clock">12:00:00</div>
    </div>

    <script>
        // Функція для відкриття вікон
        function openWin(id) {
            document.getElementById(id).style.display = 'flex';
        }

        // Функція для закриття вікон
        function closeWin(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Функція для відкриття/закриття меню Пуск
        function toggleStart() {
            var menu = document.getElementById('start-menu');
            if (menu.style.display === 'none') {
                menu.style.display = 'block';
            } else {
                menu.style.display = 'none';
            }
        }

        // СКРИПТ РЕАЛЬНОГО ЧАСУ (ГОДИННИК)
        function updateClock() {
            var now = new Date();
            var hours = now.getHours().toString().padStart(2, '0');
            var minutes = now.getMinutes().toString().padStart(2, '0');
            var seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').innerText = hours + ':' + minutes + ':' + seconds;
        }
        setInterval(updateClock, 1000); // Оновлювати кожну секунду
        updateClock(); // Запустити одразу при завантаженні
    </script>
</body>
</html>
